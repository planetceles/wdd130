<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WDD 130 | HTML Form - User Poll</title>
    <link rel="stylesheet" href="styles/poll-form.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Serif:ital,opsz,wght,GRAD@0,8..144,100..900,100;1,8..144,100..900,100&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <h1>WDD 130 | Celestine Mande  | HTML Form - User Poll</h1>
    </header>
    <main>
       <div class="formhead">
            <h2>WDD130 | Form - User Poll</h2>
        <form>
            
            <fieldset class="fieldone">
                <legend>Contact Information</legend>
            <div class="label1">    
               <label for="fullname">Full Name:</label>
                <input type="text" id="fullname" name="fullname"><br>
                <label for="useremail">Email:</label>
                <input type="text" id="useremail" name="useremail">
              <!--  <label>Full name: <input type="text" name="fullname"></label>
                <label>Email: <input type="text" name="useremail"></label>  -->
            </div>   
            </fieldset>
            <fieldset class="fieldtwo">
                <legend>Questions</legend>
            <div class="lab3">    
                <label for="browser">What is your favorite internet browser?</label>
                <select id="browser" name="browser">
                    <option value="chrome">Chrome</option>
                    <option value="firefox">firefox</option>
                    <option value="safari">Safari</option>
                    <option value="edge">Edge</option>
                    <option value="brave">Brave</option>
                    <option value="other">Other</option>
                </select><br>
            </div>    
            <div class="lab2">    
                <label for="pet" class="lab2">Do you have a household pet?</label>
                <input type="checkbox" id="pet" name="pet"><br>
            </div>    
                <label for="feedback" class="places">List the places you have lived:</label>
                <textarea id="feedback" name="feedback" rows="4" placeholder="Stillwater Florida, Amsterdam Netherlands, Tibuktu"></textarea>
            </fieldset>
            <button type="submit" class="button1">Submit Poll</button>
        </form>
    </div>
    </main>
    <footer>©2025 | HTML Form - User Poll Activity | Celestine Mande </footer>
</body>
</html>
