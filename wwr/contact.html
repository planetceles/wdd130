        <div class="form">
            <h1>Contact Us</h1>
            <form action="#" method="post">
                <fieldset>
                    <legend>Contact Information</legend>
                    <label for="fullname">Full Name:</label>
                    <input type="text" id="fullname" name="fullname" required><br>
                
                <div class="useremail">
                    <label for="useremail">Email</label>
                    <input type="text" id="useremail" name="useremail" required><br>
                </div>
                    
                </fieldset>
                <fieldset>
                    <legend>Your Message</legend>
                    <label for="message">Purpose of the massage:</label>
                    <div class="radio">
                        <input type="radio" id="general" name="Purpose" value="General Inquiry" required>
                        <label for="general">General Inquiry</label><br>
    
                        <input type="radio" id="reservation" name="Purpose" value="Reservation Question">
                        <label for="reservation">Reservation Question</label><br>
    
                        <input type="radio" id="suggession" name="Purpose" value="Website Suggession">
                        <label for="suggession">Website Suggession</label><br>
    
                    </div>
                        <label for="Message">Message</label>
                        <textarea id="message" name="message" rows="4" required></textarea>
    
                    <div class="checkbox">
                        <input type="checkbox" id="subscribe" name="subscribe">
                        <label for="subscribe">Please subscribe me to the monthly newsletter</label>
                    </div>
                </fieldset>
    
                <button type="submit">Submit</button>
    
            </form>
